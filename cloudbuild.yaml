steps:
  # Authenticate Docker to Artifact Registry
  - name: gcr.io/cloud-builders/gcloud
    args: ["auth", "configure-docker", "us-west1-python.pkg.dev"]

  # Build image
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "gcr.io/$PROJECT_ID/dad-control-api", "."]

  # Push image
  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/dad-control-api"]

  # Deploy Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "dad-control-api",
        "--image",
        "gcr.io/$PROJECT_ID/dad-control-api",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
      ]

images:
  - gcr.io/$PROJECT_ID/dad-control-api
