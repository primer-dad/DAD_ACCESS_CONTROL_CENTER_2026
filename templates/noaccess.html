<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body,
        html {
            height: 100%;
        }

        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            text-align: center;
        }

        .icon-lg-svg {
            width: 130px;
            height: 130px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        .content-wrapper {
            max-width: 500px;
            width: 100%;
            padding: 2rem;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body class="bg-light">
    <div class="d-flex justify-content-center align-items-center min-vh-100 w-100">

        <div class="content-wrapper">

            <div class="mb-4">
                <img src="{{ url_for('static', filename='images/login_logo.png') }}" alt="Company Logo"
                    class="mb-6 rounded-full shadow-lg icon-lg-svg" style="border-radius: 50%;">
            </div>

            <h2 class="display-5 fw-bold text-dark mb-3">
                Access Denied
            </h2>

            <p class="lead text-muted mb-4">
                You do not have permission to view this page.
                <br class="d-none d-sm-block">
                This content is restricted to authorized users only.
            </p>

            <p class="fw-semibold text-secondary mb-5">
                Please contact your administrator for assistance or to request access.
            </p>

            <a href="mailto:admin@example.com" class="btn btn-primary shadow rounded-pill">
                Contact Administrator
            </a>

            <p class="mt-5 small text-muted">
                Reference: Error Code 403
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
